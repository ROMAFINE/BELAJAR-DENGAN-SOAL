<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MATERI KELAS 10 BY @ROMA - AI Configurable</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🧮 Ujian Matematika SMA Kelas 10</h1>
        <div class="timer" id="timer">
          ⏰ Waktu: <span id="time-left">30:00</span>
        </div>
        <div class="progress" id="progress">
          Soal <span id="current-ques">1</span> dari
          <span id="total-ques">58</span>
        </div>
      </header>

      <main id="quiz-container">
        <div class="question" id="question">
          Mulai ujian dengan AI generator!
        </div>
        <div class="hint" id="hint"></div>
        <div class="options" id="options"></div>
        <div class="navigation">
          <button id="prev-btn" class="nav-btn" disabled>⬅️ Sebelumnya</button>
          <button id="next-btn" class="nav-btn">Selanjutnya ➡️</button>
          <button id="submit-btn" class="submit-btn" style="display: none">
            ✅ Submit Ujian
          </button>
        </div>

        <div class="ai-chat-section">
          <h3>🤖 AI Quiz Generator - Atur Jumlah Soal (1-58) & Waktu</h3>

          <!-- New config inputs -->
          <div class="config-panel">
            <label
              >Jumlah Soal:
              <input
                type="range"
                id="num-questions-slider"
                min="1"
                max="58"
                value="20"
                class="slider"
              />
              <span id="num-questions-value">20</span>
            </label>
            <label
              >Waktu (menit):
              <input
                type="number"
                id="time-minutes"
                min="5"
                max="120"
                value="30"
              />
            </label>
          </div>

          <div class="chat-input-area">
            <input
              type="text"
              id="ai-prompt"
              placeholder="Ketik: 'generate 20 soal 30 menit' atau 'buat trigonometri sulit 10 soal 15 menit', atau 'jelaskan soal ini...'"
            />
            <button id="ai-generate-btn">✨ Generate Quiz</button>
          </div>

          <div id="ai-response" class="ai-response"></div>
        </div>
      </main>

      <div id="result-modal" class="modal">
        <div class="modal-content">
          <h2>🎉 Hasil Ujian Selesai!</h2>
          <p>Nilai Anda: <span id="final-score"></span></p>
          <p id="result-message"></p>
          <button id="restart-btn">🔄 Ulangi Ujian</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
